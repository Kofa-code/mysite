name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # Runs every 14 minutes
  workflow_dispatch:        # Allows you to run it manually

jobs:
  ping_render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: curl -s https://david-kofa.onrender.com > /dev/null
